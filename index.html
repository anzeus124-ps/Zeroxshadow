<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Full Screen | b.png Background</title>
  <style>
    /* COMPLETE RESET - NO MARGINS, NO PADDING, NO SCROLLBARS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* FULL SCREEN HTML & BODY */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;     /* removes all scrollbars - pure fullscreen */
    }

    body {
      background-color: #000000;  /* pure black fallback - no text */
    }

    /* DIRECT FULL SCREEN BACKGROUND IMAGE */
    .full-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* IMAGE STYLES - CRISP, NO BLUR, FULL COVERAGE, NO GAPS */
    .full-bg img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;     /* covers entire screen without distortion */
      position: absolute;
      top: 0;
      left: 0;
    }

    /* ABSOLUTELY NO TEXT, NO WATERMARK, NO OVERLAY */
    /* Pure background only - clean and simple */
  </style>
</head>
<body>

  <!-- DIRECT IMAGE FROM SAME FOLDER - b.png (NO IMG FOLDER) -->
  <div class="full-bg">
    <img src="b.png" alt="" aria-hidden="true">
  </div>

  <!-- SILENT ERROR HANDLER - NO VISIBLE TEXT ON SCREEN -->
  <script>
    (function() {
      const bgImage = document.querySelector('.full-bg img');
      
      // If image fails to load, keep clean black background - NO text appears on screen
      bgImage.onerror = function() {
        // Silent fail - only console log for debugging (invisible to user)
        console.log("Note: b.png not found. Make sure 'b.png' is in the same folder as this HTML file");
        // Keep background pure black - no visible messages
      };
    })();
  </script>
</body>
</html>
